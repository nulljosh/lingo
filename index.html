<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Lingo - Learn Anything</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --bg-secondary: #141414;
            --bg-tertiary: #1a1a1a;
            --bg-card: rgba(255, 255, 255, 0.04);
            --bg-card-hover: rgba(255, 255, 255, 0.07);
            --bg-card-active: rgba(255, 255, 255, 0.10);
            --border: rgba(255, 255, 255, 0.08);
            --border-hover: rgba(255, 255, 255, 0.14);
            --border-active: rgba(255, 255, 255, 0.20);
            --text-primary: #fafafa;
            --text-secondary: #a3a3a3;
            --text-muted: #636363;
            --accent: #fafafa;
            --accent-dim: rgba(250, 250, 250, 0.12);
            --success: #22c55e;
            --success-bg: rgba(34, 197, 94, 0.10);
            --success-border: rgba(34, 197, 94, 0.25);
            --error: #ef4444;
            --error-bg: rgba(239, 68, 68, 0.10);
            --error-border: rgba(239, 68, 68, 0.25);
            --radius-sm: 8px;
            --radius-md: 12px;
            --radius-lg: 16px;
            --radius-pill: 980px;
            --font: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', sans-serif;
            --font-mono: 'SF Mono', Monaco, 'Cascadia Code', monospace;
            --spring: cubic-bezier(0.34, 1.56, 0.64, 1);
            --ease: cubic-bezier(0.4, 0, 0.2, 1);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font);
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        /* Header */
        .header {
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
            padding: env(safe-area-inset-top, 0) 0 0 0;
        }

        .header-inner {
            max-width: 960px;
            margin: 0 auto;
            padding: 0.875rem 1.5rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 0.9375rem;
            font-weight: 600;
            color: var(--text-primary);
            letter-spacing: -0.02em;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            transition: opacity 0.2s;
        }

        .logo:hover { opacity: 0.7; }

        .logo i {
            font-size: 0.75rem;
            opacity: 0.5;
        }

        .stats {
            display: flex;
            gap: 0.25rem;
            align-items: center;
        }

        .stat-item {
            display: flex;
            align-items: center;
            gap: 0.375rem;
            color: var(--text-secondary);
            font-size: 0.8125rem;
            font-weight: 500;
            padding: 0.375rem 0.75rem;
            border-radius: var(--radius-pill);
            border: 1px solid transparent;
            transition: all 0.2s var(--ease);
            letter-spacing: 0.01em;
        }

        .stat-item i {
            font-size: 0.6875rem;
        }

        .stat-item .stat-val {
            font-variant-numeric: tabular-nums;
        }

        .stat-item:hover {
            border-color: var(--border);
            color: var(--text-primary);
        }

        .stat-streak i { color: #f97316; }
        .stat-xp i { color: #eab308; }
        .stat-hearts i { color: #ef4444; }

        /* Container */
        .container {
            flex: 1;
            max-width: 960px;
            width: 100%;
            margin: 0 auto;
            padding: 2.5rem 1.5rem;
            padding-bottom: calc(2.5rem + env(safe-area-inset-bottom, 0));
        }

        /* Category Tabs */
        .category-tabs {
            display: flex;
            gap: 0.25rem;
            margin-bottom: 2rem;
            border-bottom: 1px solid var(--border);
            padding-bottom: 0;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .category-tabs::-webkit-scrollbar { display: none; }

        .category-tab {
            padding: 0.625rem 1rem;
            color: var(--text-muted);
            font-size: 0.8125rem;
            font-weight: 500;
            cursor: pointer;
            white-space: nowrap;
            border-bottom: 2px solid transparent;
            transition: all 0.2s var(--ease);
            letter-spacing: 0.02em;
            margin-bottom: -1px;
        }

        .category-tab:hover {
            color: var(--text-secondary);
        }

        .category-tab.active {
            color: var(--text-primary);
            border-bottom-color: var(--text-primary);
        }

        /* Section Title */
        .section-title {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 1.25rem;
        }

        /* Subject Grid */
        .subject-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            overflow: hidden;
        }

        .subject-card {
            background: var(--bg-secondary);
            padding: 1.25rem;
            cursor: pointer;
            transition: all 0.2s var(--ease);
            display: flex;
            flex-direction: column;
            gap: 0.625rem;
            position: relative;
        }

        .subject-card:hover {
            background: var(--bg-tertiary);
        }

        .subject-card.selected {
            background: var(--bg-card-active);
        }

        .subject-icon {
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: var(--radius-sm);
            background: var(--bg-card);
            border: 1px solid var(--border);
            color: var(--text-secondary);
            font-size: 0.875rem;
        }

        .subject-name {
            font-weight: 500;
            font-size: 0.875rem;
            color: var(--text-primary);
            letter-spacing: -0.01em;
        }

        .subject-level {
            font-size: 0.75rem;
            color: var(--text-muted);
            letter-spacing: 0.01em;
        }

        /* Lesson */
        .lesson-container {
            display: none;
        }

        .lesson-container.active {
            display: block;
            animation: fadeUp 0.35s var(--ease);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Progress */
        .progress-container {
            margin-bottom: 2rem;
            display: flex;
            align-items: center;
            gap: 0.75rem;
        }

        .progress-bar {
            flex: 1;
            background: var(--bg-tertiary);
            height: 4px;
            border-radius: 2px;
            overflow: hidden;
        }

        .progress-fill {
            background: var(--text-primary);
            height: 100%;
            border-radius: 2px;
            transition: width 0.4s var(--ease);
            width: 0%;
        }

        .progress-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            font-variant-numeric: tabular-nums;
            white-space: nowrap;
        }

        /* Question Card */
        .question-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 2rem;
            margin-bottom: 1.5rem;
        }

        .question-container {
            animation: fadeIn 0.3s var(--ease);
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .question-type {
            font-size: 0.75rem;
            font-weight: 500;
            text-transform: uppercase;
            letter-spacing: 0.08em;
            color: var(--text-muted);
            margin-bottom: 0.75rem;
        }

        .question-text {
            font-size: 1.375rem;
            font-weight: 600;
            color: var(--text-primary);
            margin-bottom: 1.75rem;
            letter-spacing: -0.02em;
            line-height: 1.35;
        }

        .math-equation {
            font-size: 1.75rem;
            font-weight: 600;
            color: var(--text-primary);
            text-align: center;
            margin: 1.5rem 0 2rem;
            font-family: var(--font-mono);
            letter-spacing: -0.02em;
        }

        /* Inputs */
        .math-input,
        .translation-input {
            width: 100%;
            padding: 0.875rem 1rem;
            font-size: 1rem;
            font-family: var(--font);
            background: var(--bg-primary);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            color: var(--text-primary);
            transition: border-color 0.2s var(--ease);
            outline: none;
        }

        .math-input {
            text-align: center;
            font-family: var(--font-mono);
        }

        .math-input::placeholder,
        .translation-input::placeholder {
            color: var(--text-muted);
        }

        .math-input:focus,
        .translation-input:focus {
            border-color: var(--border-active);
        }

        /* Choices */
        .choices-container {
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
        }

        .choice-btn {
            background: var(--bg-primary);
            border: 1px solid var(--border);
            padding: 1rem 1.25rem;
            border-radius: var(--radius-md);
            cursor: pointer;
            font-size: 0.9375rem;
            font-family: var(--font);
            color: var(--text-primary);
            transition: all 0.15s var(--ease);
            text-align: left;
            font-weight: 400;
            line-height: 1.4;
        }

        .choice-btn:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
        }

        .choice-btn.selected {
            border-color: var(--border-active);
            background: var(--bg-card-active);
        }

        .choice-btn.correct {
            background: var(--success-bg);
            border-color: var(--success-border);
            color: var(--success);
        }

        .choice-btn.incorrect {
            background: var(--error-bg);
            border-color: var(--error-border);
            color: var(--error);
        }

        /* Word Bank */
        .word-bank {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            padding: 1.25rem;
            background: var(--bg-primary);
            border: 1px dashed var(--border);
            border-radius: var(--radius-md);
            min-height: 64px;
        }

        .word-chip {
            background: var(--bg-tertiary);
            color: var(--text-primary);
            padding: 0.5rem 0.875rem;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all 0.15s var(--ease);
            font-size: 0.875rem;
            font-weight: 500;
            border: 1px solid var(--border);
            user-select: none;
        }

        .word-chip:hover {
            border-color: var(--border-hover);
            background: var(--bg-card-hover);
        }

        .word-chip.used {
            opacity: 0.25;
            cursor: default;
            transform: scale(0.95);
        }

        .answer-box {
            min-height: 56px;
            padding: 0.875rem 1rem;
            background: var(--bg-primary);
            border: 1px solid var(--border-active);
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
        }

        /* Buttons */
        .btn-container {
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 0.75rem;
        }

        .btn {
            font-family: var(--font);
            font-size: 0.875rem;
            font-weight: 500;
            padding: 0.625rem 1.25rem;
            border-radius: var(--radius-pill);
            cursor: pointer;
            transition: all 0.2s var(--ease);
            border: 1px solid var(--border);
            background: transparent;
            color: var(--text-secondary);
            letter-spacing: 0.01em;
        }

        .btn:hover {
            border-color: var(--border-hover);
            color: var(--text-primary);
            transform: translateY(-1px);
        }

        .btn:disabled {
            opacity: 0.3;
            cursor: not-allowed;
            transform: none;
        }

        .btn-primary {
            background: var(--text-primary);
            color: var(--bg-primary);
            border-color: var(--text-primary);
        }

        .btn-primary:hover {
            opacity: 0.85;
            color: var(--bg-primary);
        }

        /* Feedback */
        .feedback {
            padding: 0.875rem 1rem;
            border-radius: var(--radius-md);
            margin-bottom: 1rem;
            display: none;
            font-size: 0.875rem;
            font-weight: 500;
        }

        .feedback.correct {
            background: var(--success-bg);
            color: var(--success);
            border: 1px solid var(--success-border);
        }

        .feedback.incorrect {
            background: var(--error-bg);
            color: var(--error);
            border: 1px solid var(--error-border);
        }

        .feedback.show { display: block; }

        /* Results */
        .result-container {
            display: none;
            text-align: center;
        }

        .result-container.active {
            display: block;
            animation: fadeUp 0.35s var(--ease);
        }

        .result-card {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: var(--radius-lg);
            padding: 3rem 2rem;
        }

        .result-icon {
            width: 56px;
            height: 56px;
            margin: 0 auto 1.25rem;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            background: var(--success-bg);
            border: 1px solid var(--success-border);
            color: var(--success);
            font-size: 1.25rem;
        }

        .result-title {
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 0.375rem;
            letter-spacing: -0.02em;
        }

        .result-subtitle {
            font-size: 0.875rem;
            color: var(--text-muted);
            margin-bottom: 2rem;
        }

        .result-stats {
            display: flex;
            justify-content: center;
            gap: 1px;
            background: var(--border);
            border: 1px solid var(--border);
            border-radius: var(--radius-md);
            overflow: hidden;
            margin-bottom: 2rem;
        }

        .result-stat {
            background: var(--bg-primary);
            padding: 1.25rem 2rem;
            flex: 1;
        }

        .result-stat-value {
            font-size: 1.5rem;
            font-weight: 600;
            margin-bottom: 0.25rem;
            font-variant-numeric: tabular-nums;
            letter-spacing: -0.02em;
        }

        .result-stat-label {
            font-size: 0.75rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.06em;
        }

        /* Responsive */
        @media (max-width: 640px) {
            .header-inner { padding: 0.75rem 1rem; }
            .container { padding: 1.5rem 1rem; }
            .stats { gap: 0; }
            .stat-item { padding: 0.375rem 0.5rem; font-size: 0.75rem; }
            .question-text { font-size: 1.125rem; }
            .math-equation { font-size: 1.375rem; }
            .question-card { padding: 1.5rem; }
            .subject-grid { grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); }
            .result-stats { flex-direction: column; }
            .result-stat { padding: 1rem; }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }
    </style>
</head>
<body>
    <header class="header">
        <div class="header-inner">
            <div class="logo" onclick="resetToHome()">
                <i class="fa-solid fa-language"></i>
                Lingo
            </div>
            <div class="stats">
                <div class="stat-item stat-streak">
                    <i class="fa-solid fa-fire"></i>
                    <span class="stat-val" id="streak">0</span>
                </div>
                <div class="stat-item stat-xp">
                    <i class="fa-solid fa-star"></i>
                    <span class="stat-val" id="xp">0</span>
                </div>
                <div class="stat-item stat-hearts">
                    <i class="fa-solid fa-heart"></i>
                    <span class="stat-val" id="hearts">5</span>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="subject-selection" id="subjectSelection">
            <div class="category-tabs">
                <div class="category-tab active" data-category="languages">Languages</div>
                <div class="category-tab" data-category="programming">Programming</div>
                <div class="category-tab" data-category="math">Math</div>
                <div class="category-tab" data-category="science">Science</div>
                <div class="category-tab" data-category="skills">Skills</div>
            </div>

            <div class="section-title" id="categoryTitle">Choose a language</div>
            <div class="subject-grid" id="subjectGrid"></div>
        </div>

        <div class="lesson-container" id="lessonContainer">
            <div class="progress-container">
                <div class="progress-bar">
                    <div class="progress-fill" id="progressBar"></div>
                </div>
                <div class="progress-label" id="progressLabel">0 / 10</div>
            </div>

            <div class="question-card">
                <div class="question-container" id="questionContainer"></div>
                <div class="feedback" id="feedback"></div>
                <div class="btn-container">
                    <button class="btn" id="skipBtn">Skip</button>
                    <button class="btn btn-primary" id="checkBtn">Check</button>
                </div>
            </div>
        </div>

        <div class="result-container" id="resultContainer">
            <div class="result-card">
                <div class="result-icon">
                    <i class="fa-solid fa-trophy"></i>
                </div>
                <h2 class="result-title">Lesson Complete</h2>
                <p class="result-subtitle">Here is how you did.</p>
                <div class="result-stats">
                    <div class="result-stat">
                        <div class="result-stat-value" id="correctCount">0</div>
                        <div class="result-stat-label">Correct</div>
                    </div>
                    <div class="result-stat">
                        <div class="result-stat-value" id="xpEarned">0</div>
                        <div class="result-stat-label">XP Earned</div>
                    </div>
                </div>
                <button class="btn btn-primary" id="continueBtn">Continue</button>
            </div>
        </div>
    </div>

    <script src="js/lingo-data.js"></script>
    <script src="js/lingo-app.js"></script>
</body>
</html>
